name: Docker Build and Push

on:
  workflow_call:

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: lojzatran
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

    steps:
      - name: Validate website Supabase secrets
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL}" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL secret is required."
            exit 1
          fi

          if [ -z "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ] && [ -z "${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}" ]; then
            echo "Set NEXT_PUBLIC_SUPABASE_ANON_KEY or NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY secret."
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Metadata for job-applicator-api
        id: meta-job-applicator-api
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/job-applicator-api
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push job-applicator-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta-job-applicator-api.outputs.tags }}
          labels: ${{ steps.meta-job-applicator-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Metadata for job-applicator-website
        id: meta-job-applicator-website
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/job-applicator-website
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push job-applicator-website image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/website/Dockerfile
          push: true
          tags: ${{ steps.meta-job-applicator-website.outputs.tags }}
          labels: ${{ steps.meta-job-applicator-website.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ env.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ env.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${{ env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }}

      - name: Metadata for job-applicator-db-reset
        id: meta-job-applicator-db-reset
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/job-applicator-db-reset
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push job-applicator-db-reset image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile.db-reset
          push: true
          tags: ${{ steps.meta-job-applicator-db-reset.outputs.tags }}
          labels: ${{ steps.meta-job-applicator-db-reset.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Metadata for job-applicator-ollama
        id: meta-job-applicator-ollama
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/job-applicator-ollama
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push job-applicator-ollama image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployment/Dockerfile.ollama
          push: true
          tags: ${{ steps.meta-job-applicator-ollama.outputs.tags }}
          labels: ${{ steps.meta-job-applicator-ollama.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
  
  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build-and-push]
    steps:
      - uses: actions/checkout@v6

      - name: Copy compose files via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "deployment/docker-compose.yml"
          target: "~/job-applicator"
          overwrite: true
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd ~/job-applicator
            docker compose --profile '*' pull
            docker compose --profile infrastructure --profile ai --profile app up -d --remove-orphans
