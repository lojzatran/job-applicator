name: e2e

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      CI: true
      HEADLESS: true
      SKIP_ENV_VALIDATION: true
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applicator
      RABBITMQ_URL: amqp://127.0.0.1:5672

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all projects
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Verify Supabase configuration
        run: |
          if [ -z "$NEXT_PUBLIC_SUPABASE_URL" ]; then
            echo "NEXT_PUBLIC_SUPABASE_URL secret is required for e2e tests."
            exit 1
          fi

          if [ -z "$SUPABASE_SECRET_KEY" ]; then
            echo "SUPABASE_SECRET_KEY secret is required for e2e tests."
            exit 1
          fi

      - name: Run e2e tests
        run: npx nx e2e website-e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-output/
            playwright-report/
          retention-days: 7
