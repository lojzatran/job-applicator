name: test

on:
  push:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      SKIP_ENV_VALIDATION: true
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applicator
      RABBITMQ_URL: amqp://127.0.0.1:5672
      RABBITMQ_QUEUE: process_job_applications
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      EMBEDDING_MODEL: nomic-embed-text-v2-moe:latest
      CV_PARSER_MODEL: gemini-3.1-flash-lite-preview
      JOB_EVALUATOR_MODEL: gemini-3.1-flash-lite-preview
      COVER_LETTER_GENERATOR_MODEL: llama3.1:8b
      CRITIQUE_MODEL: llama3.1:8b
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all projects
        run: npm run build

      - name: Start services
        run: docker compose up -d

      - name: Install Ollama
        run: curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          nohup ollama serve > /tmp/ollama.log 2>&1 &
          echo $! > /tmp/ollama.pid
          for attempt in {1..60}; do
            if nc -z 127.0.0.1 11434; then
              break
            fi

            sleep 2
          done

          if ! nc -z 127.0.0.1 11434; then
            echo "Failed to start Ollama on port 11434"
            exit 1
          fi

      - name: Wait for services
        run: |
          for port in 5432 5672; do
            for attempt in {1..60}; do
              if nc -z 127.0.0.1 "$port"; then
                break
              fi

              sleep 2
            done

            if ! nc -z 127.0.0.1 "$port"; then
              echo "Service on port $port is not reachable"
              exit 1
            fi
          done

      - name: Run migrations
        run: npm run migrate

      - name: Verify Gemini configuration
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "GEMINI_API_KEY is required to run the test suite in CI."
            exit 1
          fi

      - name: Pull Ollama models
        run: |
          ollama pull "$EMBEDDING_MODEL"
          ollama pull "$COVER_LETTER_GENERATOR_MODEL"

      - name: Run all tests
        run: npm test

      - name: Stop services
        if: always()
        run: |
          if [ -f /tmp/ollama.pid ]; then
            kill "$(cat /tmp/ollama.pid)" || true
          fi

          docker compose down -v --remove-orphans
