services:
  rabbitmq:
    image: rabbitmq:4.2.3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_ERLANG_COOKIE=a_very_long_secret_cookie_for_rabbitmq_4_0
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    profiles:
      - infrastructure
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - 5432:5432
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applicator
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d job_applicator']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles:
      - infrastructure
  ollama:
    profiles:
      - ai
    build:
      context: .
      dockerfile: Dockerfile.ollama
    ports:
      - '11434:11434'
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:11434/api/tags']
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s
  api:
    profiles:
      - app
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - OLLAMA_EMBEDDING_BASE_URL=http://ollama:11434
      - STORAGE_DIR=/app/uploads
      - POSTGRES_HOST=postgres
      - LOGS_DIR=/app/logs
    env_file:
      - path: ../.env
        required: true
      - path: ../apps/api/.env
        required: false
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ../logs:/app/logs

  website:
    profiles:
      - app
    build:
      context: ..
      dockerfile: apps/website/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
    ports:
      - '3001:3000'
    env_file:
      - .env
    environment:
      NODE_ENV: development
      RABBITMQ_URL: amqp://rabbitmq:5672
      POSTGRES_HOST: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applicator
      STORAGE_DIR: /app/uploads
      LOGS_DIR: /app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
      - ../logs:/app/logs

  db-reset:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.db-reset
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=job_applicator
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools-reset

  db-migrate:
    build:
      context: ..
      dockerfile: deployment/Dockerfile.db-migrate
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=job_applicator
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools-migrate

  otel-collector:
    profiles:
      - observability
    image: otel/opentelemetry-collector-contrib
    environment:
      - LOGS_DIR=/app/logs
    env_file:
      - path: ../.env
        required: true
    volumes:
      - ../observability/otel-collector-config.base.yaml:/etc/otelcol-contrib/config.yaml
      - ../observability/otel-collector-config.local.yaml:/etc/otelcol-contrib/config.local.yaml
      - ../logs:/app/logs
    command:
      - --config=/etc/otelcol-contrib/config.yaml
      - --config=/etc/otelcol-contrib/config.local.yaml
    ports:
      - 13133:13133 # health_check extension
      - 4318:4318 # OTLP http receiver

volumes:
  ollama_data:
  uploads:
