services:
  rabbitmq:
    image: rabbitmq:4.2.3-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      - RABBITMQ_ERLANG_COOKIE=a_very_long_secret_cookie_for_rabbitmq_4_0
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  postgres:
    image: pgvector/pgvector:pg18
    ports:
      - 5432:5432
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_applicator
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d job_applicator']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=job_applicator
      - EMBEDDING_MODEL=nomic-embed-text-v2-moe:latest
      - JOB_EVALUATOR_MODEL=gemma4:e2b
      - OLLAMA_BASE_URL=http://localhost:11434
      - COVER_LETTER_GENERATOR_MODEL=gemma4:e2b
      - CRITIQUE_MODEL=gemma4:e2b
    depends_on:
      - rabbitmq
      - postgres

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - rabbitmq
      - postgres
